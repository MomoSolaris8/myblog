---
layout: null
permalink: /write/
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Write — {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <style>
    /* Write-page-only styles */
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .write-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 32px; border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.96); backdrop-filter: blur(8px);
      flex-shrink: 0; z-index: 10;
    }
    .write-nav-left { display: flex; align-items: center; gap: 16px; }
    .back-link { text-decoration: none; color: var(--muted); font-size: 0.9rem; }
    .back-link:hover { color: var(--text); }
    .save-status { font-size: 0.82rem; color: var(--muted); }
    .write-nav-right { display: flex; align-items: center; gap: 10px; }
    .btn-settings {
      background: none; border: none; cursor: pointer;
      font-size: 1rem; color: var(--muted); padding: 6px 8px;
      border-radius: 6px; transition: background 0.15s;
    }
    .btn-settings:hover { background: #f0f0f0; }
    .editor-wrap { flex: 1; overflow-y: auto; padding: 48px 32px 100px; }
    .editor-inner { max-width: 680px; margin: 0 auto; }
    .title-input {
      width: 100%; border: none; outline: none;
      font-family: var(--font-ui); font-size: 2.4rem; font-weight: 700;
      color: var(--text); letter-spacing: -0.5px; line-height: 1.2;
      margin-bottom: 28px; resize: none; background: transparent;
    }
    .title-input::placeholder { color: #c0c0c0; }
    .content-input {
      width: 100%; min-height: 500px; border: none; outline: none;
      font-family: var(--font-content); font-size: 1.15rem;
      color: var(--text); line-height: 1.85; resize: none; background: transparent;
    }
    .content-input::placeholder { color: #c0c0c0; }
    .preview-area {
      font-family: var(--font-content); font-size: 1.15rem;
      color: #3d3d3d; line-height: 1.85; display: none;
    }
    .preview-area h1,.preview-area h2,.preview-area h3 {
      font-family: var(--font-ui); margin: 1.8em 0 0.6em; line-height: 1.3;
    }
    .preview-area p { margin-bottom: 1.4em; }
    .preview-area blockquote {
      border-left: 3px solid #ddd; padding-left: 20px; color: var(--muted);
      font-style: italic; margin: 1.5em 0;
    }
    .preview-area code {
      font-family: 'SF Mono', Consolas, monospace; font-size: 0.85em;
      background: #f5f5f5; padding: 2px 6px; border-radius: 3px;
    }
    .preview-area pre {
      background: #1e1e1e; color: #d4d4d4; padding: 20px;
      border-radius: 8px; overflow-x: auto; margin: 1.5em 0;
    }
    .preview-area pre code { background: none; color: inherit; padding: 0; font-size: 0.9rem; }
    .preview-area ul,.preview-area ol { padding-left: 1.5em; margin-bottom: 1.4em; }
    .write-footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 10px 32px; border-top: 1px solid var(--border);
      background: rgba(255,255,255,0.96); backdrop-filter: blur(8px);
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.82rem; color: var(--muted);
    }
    .btn-toggle-preview {
      background: none; border: 1px solid var(--border); cursor: pointer;
      font-size: 0.82rem; padding: 5px 14px; border-radius: 100px;
      font-family: var(--font-ui); color: var(--text); transition: background 0.15s;
    }
    .btn-toggle-preview:hover { background: #f5f5f5; }
    /* Settings Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      z-index: 100; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .modal-box {
      background: white; border-radius: 16px; padding: 40px;
      max-width: 460px; width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    }
    .modal-box h2 { font-size: 1.3rem; margin-bottom: 6px; }
    .modal-desc { color: var(--muted); font-size: 0.88rem; margin-bottom: 28px; line-height: 1.5; }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 0.78rem; font-weight: 600;
      color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .form-group input {
      width: 100%; padding: 10px 14px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 0.95rem; font-family: var(--font-ui);
      outline: none; transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: var(--text); }
    .modal-actions { margin-top: 24px; display: flex; flex-direction: column; gap: 10px; }
    .help-link { font-size: 0.82rem; color: var(--muted); text-align: center; }
    .help-link a { color: var(--text); }
    /* Toast */
    .toast {
      position: fixed; bottom: 68px; left: 50%; transform: translateX(-50%);
      background: var(--text); color: white; padding: 10px 22px;
      border-radius: 100px; font-size: 0.88rem; z-index: 200;
      opacity: 0; transition: opacity 0.25s; pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
    @media (max-width: 640px) {
      .write-nav { padding: 12px 16px; }
      .editor-wrap { padding: 32px 16px 100px; }
      .write-footer { padding: 10px 16px; }
      .title-input { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<!-- Top nav -->
<nav class="write-nav">
  <div class="write-nav-left">
    <a href="{{ '/' | relative_url }}" class="back-link">← Home</a>
    <span id="save-status" class="save-status">Draft</span>
  </div>
  <div class="write-nav-right">
    <button class="btn-settings" onclick="openSettings()" title="GitHub Settings">⚙</button>
    <button id="btn-publish" class="btn-write" onclick="publish()">Save post</button>
  </div>
</nav>

<!-- Editor -->
<div class="editor-wrap">
  <div class="editor-inner">
    <textarea
      id="title"
      class="title-input"
      placeholder="Title"
      rows="1"
      oninput="onEdit(); autoResize(this)"
    ></textarea>
    <textarea
      id="content"
      class="content-input"
      placeholder="Tell your story..."
      oninput="onEdit()"
    ></textarea>
    <div id="preview" class="preview-area"></div>
  </div>
</div>

<!-- Bottom bar -->
<div class="write-footer">
  <span id="word-count">0 words</span>
  <button class="btn-toggle-preview" onclick="togglePreview()">Preview</button>
</div>

<!-- Settings Modal -->
<div id="modal" class="modal-overlay" style="display:none" onclick="onOverlayClick(event)">
  <div class="modal-box">
    <h2>GitHub Token</h2>
    <p class="modal-desc">只需填一次，存在这个浏览器里。</p>
    <div class="form-group">
      <label>Token（需要 repo 权限）</label>
      <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
    </div>
    <div class="modal-actions">
      <button class="btn-write" style="width:100%;padding:12px;border-radius:8px;font-size:1rem" onclick="saveSettings()">Save</button>
      <p class="help-link">
        <a href="https://github.com/settings/tokens/new?scopes=repo&description=myblog" target="_blank" rel="noopener">Create GitHub Token →</a>
      </p>
    </div>
  </div>
</div>

<!-- Toast notification -->
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
<script>
  const BASE_URL  = '{{ "/" | relative_url }}';
  const GH_OWNER  = '{{ site.github_user }}';
  const GH_REPO   = '{{ site.github_repo }}';
  const TOKEN_KEY = 'gh_token';
  const DRAFT_KEY = 'gh_blog_draft';

  // ── Token ─────────────────────────────────────────────────
  function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }
  function saveToken(t) { localStorage.setItem(TOKEN_KEY, t); }

  // ── Draft auto-save ───────────────────────────────────────
  let saveTimer;
  function saveDraft() {
    localStorage.setItem(DRAFT_KEY, JSON.stringify({
      title:   document.getElementById('title').value,
      content: document.getElementById('content').value,
    }));
    setStatus('Draft saved');
  }
  function loadDraft() {
    try {
      const d = JSON.parse(localStorage.getItem(DRAFT_KEY) || '{}');
      if (d.title)   { document.getElementById('title').value   = d.title;   autoResize(document.getElementById('title')); }
      if (d.content) { document.getElementById('content').value = d.content; }
      updateWordCount();
    } catch {}
  }
  function clearDraft() { localStorage.removeItem(DRAFT_KEY); }

  function setStatus(txt) { document.getElementById('save-status').textContent = txt; }

  function onEdit() {
    setStatus('Saving…');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveDraft, 1200);
    updateWordCount();
  }

  function updateWordCount() {
    const text  = document.getElementById('content').value.trim();
    const words = text ? text.split(/\s+/).length : 0;
    document.getElementById('word-count').textContent = `${words} word${words !== 1 ? 's' : ''}`;
  }

  // Auto-resize title textarea
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }

  // ── Preview toggle ────────────────────────────────────────
  let previewing = false;
  function togglePreview() {
    previewing = !previewing;
    const ta  = document.getElementById('content');
    const pre = document.getElementById('preview');
    const btn = document.querySelector('.btn-toggle-preview');
    if (previewing) {
      pre.innerHTML = marked.parse(ta.value || '*Nothing to preview yet.*');
      pre.style.display = 'block';
      ta.style.display  = 'none';
      btn.textContent   = 'Edit';
    } else {
      pre.style.display = 'none';
      ta.style.display  = 'block';
      btn.textContent   = 'Preview';
      ta.focus();
    }
  }

  // ── Settings modal ────────────────────────────────────────
  function openSettings() {
    document.getElementById('gh-token').value = getToken();
    document.getElementById('modal').style.display = 'flex';
    document.getElementById('gh-token').focus();
  }
  function closeSettings() {
    document.getElementById('modal').style.display = 'none';
  }
  function onOverlayClick(e) {
    if (e.target === document.getElementById('modal')) closeSettings();
  }
  function saveSettings() {
    const token = document.getElementById('gh-token').value.trim();
    if (!token) { showToast('请输入 Token'); return; }
    saveToken(token);
    closeSettings();
    showToast('Token 已保存！');
  }

  // ── Publish ───────────────────────────────────────────────
  async function publish() {
    const title   = document.getElementById('title').value.trim();
    const content = document.getElementById('content').value.trim();
    if (!title)   { showToast('请先填写标题'); return; }
    if (!content) { showToast('请先写点什么'); return; }

    const btn = document.getElementById('btn-publish');
    btn.disabled = true;
    setStatus('保存中…');

    const date = new Date().toISOString().split('T')[0];
    const slug = title
      .toLowerCase()
      .replace(/[^\w\u4e00-\u9fff\s-]/g, '')
      .replace(/\s+/g, '-')
      .replace(/-+/g, '-')
      .replace(/(^-|-$)/g, '')
      .substring(0, 60) || 'untitled';

    const filename = editFile || `${date}-${slug}.md`;
    const frontmatter = `---\nlayout: post\ntitle: "${title.replace(/"/g, '\\"')}"\ndate: ${date}\n---\n\n`;
    const fileContent = frontmatter + content;
    const words = content.trim().split(/\s+/).length;

    try {
      if (isLocal) {
        // Local: POST directly to save-server.py → writes to _posts/
        const res = await fetch('http://localhost:4001/save-post', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ filename, content: fileContent }),
        });
        if (!res.ok) throw new Error('Save server error');
        clearDraft();
        document.getElementById('title').value   = '';
        document.getElementById('content').value = '';
        updateWordCount();
        setStatus('已发布');
        showToast(`已发布 · 共 ${words} 字`);
        setTimeout(() => location.href = '/', 1200);
      } else {
        // Hosted: use GitHub API
        const token = getToken();
        if (!token) { openSettings(); btn.disabled = false; return; }

        const encoded = btoa(unescape(encodeURIComponent(fileContent)));
        const apiUrl  = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/_posts/${filename}`;
        const headers = { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' };

        let sha;
        if (editFile) {
          const info = await fetch(apiUrl, { headers });
          if (info.ok) sha = (await info.json()).sha;
        }

        const body = { message: editFile ? `update: ${title}` : `publish: ${title}`, content: encoded };
        if (sha) body.sha = sha;

        const res = await fetch(apiUrl, { method: 'PUT', headers, body: JSON.stringify(body) });

        if (res.ok) {
          clearDraft();
          document.getElementById('title').value   = '';
          document.getElementById('content').value = '';
          updateWordCount();
          setStatus('Published!');
          showToast(`已发布 · 共 ${words} 字 · GitHub Actions 构建中…`);
          setTimeout(() => location.href = BASE_URL || '/', 2500);
        } else if (res.status === 401) {
          showToast('Token 无效，请检查设置');
          openSettings();
        } else {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.message || `HTTP ${res.status}`);
        }
      }
    } catch (e) {
      setStatus('Error');
      showToast(`错误: ${e.message}`);
    } finally {
      btn.disabled = false;
    }
  }

  // ── Toast ─────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3200);
  }

  // ── Edit mode: parse frontmatter ─────────────────────────
  function parseFrontmatter(raw) {
    const match = raw.match(/^---\n([\s\S]*?)\n---\n\n?([\s\S]*)$/);
    if (!match) return { title: '', content: raw };
    const titleMatch = match[1].match(/title: "(.*)"/);
    const title = titleMatch ? titleMatch[1].replace(/\\"/g, '"') : '';
    return { title, content: match[2] };
  }

  // ── Init ──────────────────────────────────────────────────
  let editFile = null;
  const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

  document.addEventListener('DOMContentLoaded', async () => {
    const params = new URLSearchParams(location.search);
    editFile = params.get('file');

    if (editFile) {
      document.getElementById('btn-publish').textContent = 'Update';
      setStatus('Editing');
      try {
        let raw;
        if (isLocal) {
          const res = await fetch(`http://localhost:4001/get-post?file=${encodeURIComponent(editFile)}`);
          raw = (await res.json()).content;
        } else {
          const token = getToken();
          if (!token) { openSettings(); return; }
          const res = await fetch(
            `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/_posts/${editFile}`,
            { headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json' } }
          );
          const data = await res.json();
          raw = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));
        }
        const parsed = parseFrontmatter(raw);
        document.getElementById('title').value   = parsed.title;
        document.getElementById('content').value = parsed.content;
        autoResize(document.getElementById('title'));
        updateWordCount();
      } catch {
        showToast('Could not load post');
      }
    } else {
      // New post: load draft
      loadDraft();
    }
    document.getElementById('title').focus();
  });

  // Cmd/Ctrl+Enter to publish
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') publish();
  });
</script>
</body>
</html>
