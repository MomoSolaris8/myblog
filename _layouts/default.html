<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <nav class="site-nav">
    <a href="{{ '/' | relative_url }}" class="site-logo">{{ site.title }}</a>
    <div class="nav-actions">
      {% if page.layout == 'post' %}
      <a href="{{ '/write/?file=' | append: page.name | relative_url }}" class="btn-edit">Edit</a>
      {% endif %}
      <a href="{{ '/write/' | relative_url }}" class="btn-write">Write</a>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>{{ site.title }}</p>
  </footer>
</body>
</html>
